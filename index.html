<style>
body{
  font-family:'Poppins',sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:25px;
  color:#111;
}

input,
textarea,
button{

}

input,
textarea{
  padding:12px;
  font-size:14px;
  border-radius:10px;
  border:1px solid #d1d5db;

  width:100%;
}

textarea{

table{

th{

h2{

/* Startseite */
#startPage{
  display:flex;
  gap:28px;
  align-items:center;
  justify-content:center;

}

.start-left{

.grid{

.history-actions{

.history-btn{

.service-work-row{

#serviceDescription{

.service-description-toggle{

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
let currentCategory = "";
let currentRecordId = null;
let currentRecordType = null;

/* ------------------------------ PDF / Logo ------------------------------ */

const LOGO_PDF_URL = "Farbstreifen.pdf";
let cachedLogoDataUrl = null;

if(window.pdfjsLib){
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
}

async function getLogoDataUrl(){
  if(cachedLogoDataUrl) return cachedLogoDataUrl;

  try{
    if(!window.pdfjsLib) return null;

    const loadingTask = pdfjsLib.getDocument(LOGO_PDF_URL);
    const pdfDoc = await loadingTask.promise;
    const page = await pdfDoc.getPage(1);

    const viewport = page.getViewport({ scale: 3 });
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext: ctx,
      viewport
    }).promise;

    cachedLogoDataUrl = canvas.toDataURL("image/png");
    return cachedLogoDataUrl;
  }catch(error){
    console.warn("Logo konnte nicht geladen werden:", error);
    return null;
  }
}

async function createPdfTitleImage(title){
  const wrap = document.createElement("div");
  wrap.style.position = "absolute";
  wrap.style.left = "-99999px";
  wrap.style.top = "0";
  wrap.style.display = "inline-block";
  wrap.style.background = "#ffffff";
  wrap.style.fontFamily = "'Poppins', sans-serif";
  wrap.style.color = "#111";
  wrap.style.padding = "0";
  wrap.style.margin = "0";
  wrap.style.whiteSpace = "nowrap";

  const titleEl = document.createElement("div");
  titleEl.style.display = "inline-block";
  titleEl.style.fontSize = "34px";
  titleEl.style.fontWeight = "600";
  titleEl.style.lineHeight = "1.15";
  titleEl.style.margin = "0";
  titleEl.style.padding = "0";
  titleEl.style.whiteSpace = "nowrap";
  titleEl.textContent = title;

  wrap.appendChild(titleEl);
  document.body.appendChild(wrap);

  const rect = wrap.getBoundingClientRect();

  const canvas = await html2canvas(wrap, {
    scale: 3,
    useCORS: true,
    backgroundColor: "#ffffff",
    width: Math.ceil(rect.width),
    height: Math.ceil(rect.height)
  });

  document.body.removeChild(wrap);

  return {
    dataUrl: canvas.toDataURL("image/png"),
    widthPx: canvas.width,
    heightPx: canvas.height
  };
}

async function createPdfSubtitleImage(text){
  const wrap = document.createElement("div");
  wrap.style.position = "absolute";
  wrap.style.left = "-99999px";
  wrap.style.top = "0";
  wrap.style.display = "inline-block";
  wrap.style.background = "#ffffff";
  wrap.style.fontFamily = "'Poppins', sans-serif";
  wrap.style.color = "#374151";
  wrap.style.padding = "0";
  wrap.style.margin = "0";
  wrap.style.whiteSpace = "nowrap";

  const subtitleEl = document.createElement("div");
  subtitleEl.style.display = "inline-block";
  subtitleEl.style.fontSize = "18px";
  subtitleEl.style.fontWeight = "400";
  subtitleEl.style.lineHeight = "1.25";
  subtitleEl.style.margin = "0";
  subtitleEl.style.padding = "0";
  subtitleEl.style.whiteSpace = "nowrap";
  subtitleEl.textContent = text;

  wrap.appendChild(subtitleEl);
  document.body.appendChild(wrap);

  const rect = wrap.getBoundingClientRect();

  const canvas = await html2canvas(wrap, {
    scale: 3,
    useCORS: true,
    backgroundColor: "#ffffff",
    width: Math.ceil(rect.width),
    height: Math.ceil(rect.height)
  });

  document.body.removeChild(wrap);

  return {
    dataUrl: canvas.toDataURL("image/png"),
    widthPx: canvas.width,
    heightPx: canvas.height
  };
}

function formatHeaderSubtitle(header){
  return [
    header?.kunde,
    header?.standort,
    header?.bestellnummer,
    header?.pst,
    header?.pruefraum,
    header?.jahr
  ]
    .map(value => String(value || "").trim())
    .filter(Boolean)
    .join(" - ");
}

function getPdfHeaderSubtitle(category){
  return formatHeaderSubtitle(getHeaderData(category));
}

function removePdfHeaderBlock(clone){
  clone.querySelectorAll(".section").forEach(section=>{
    if(section.querySelector(".header-row")){
      section.remove();
    }
  });
}

function removePdfUiElements(clone){
  clone.querySelectorAll(".back-btn,.add-btn,.remove-btn,.dropdown-toggle,.save-btn").forEach(el=>el.remove());
}

function rowHasPdfContent(tr){
  let filled = false;

  tr.querySelectorAll("input, textarea").forEach(field=>{
    if(filled) return;

    if(field.type === "checkbox"){
      if(field.checked) filled = true;
      return;
    }

    if((field.value || "").trim() !== ""){
      filled = true;
    }
  });

  return filled;
}

function removeEmptyRowsFromClone(clone){
  clone.querySelectorAll("table").forEach(table=>{
    table.querySelectorAll("tr").forEach((tr, i)=>{
      if(i === 0) return;
      if(!rowHasPdfContent(tr)) tr.remove();
    });
  });

  clone.querySelectorAll(".section").forEach(section=>{
    const table = section.querySelector("table");
    if(!table) return;

    const rows = table.querySelectorAll("tr");
    if(rows.length <= 1){
      section.remove();
    }
  });
}

/* ------------------------------ IndexedDB ------------------------------ */

const DB_NAME = "inspektionsprotokollDB";
const DB_VERSION = 1;
const STORE_NAME = "records";

function openDB(){
  return new Promise((resolve, reject)=>{
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = function(event){
      const db = event.target.result;
      if(!db.objectStoreNames.contains(STORE_NAME)){
        const store = db.createObjectStore(STORE_NAME, { keyPath: "id" });
        store.createIndex("type", "type", { unique:false });
        store.createIndex("filename", "filename", { unique:false });
      }
    };

    request.onsuccess = ()=>resolve(request.result);
    request.onerror = ()=>reject(request.error);
  });
}

async function getAllRecords(){
  const db = await openDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const request = store.getAll();
    request.onsuccess = ()=>resolve(request.result || []);
    request.onerror = ()=>reject(request.error);
  });
}

async function getRecord(id){
  const db = await openDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const request = store.get(id);
    request.onsuccess = ()=>resolve(request.result || null);
    request.onerror = ()=>reject(request.error);
  });
}

async function putRecord(record){
  const db = await openDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    const request = store.put(record);
    request.onsuccess = ()=>resolve();
    request.onerror = ()=>reject(request.error);
  });
}

async function deleteRecord(id){
  const db = await openDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    const request = store.delete(id);
    request.onsuccess = ()=>resolve();

  });
}

/* ------------------------------ Dropdown Logic ------------------------------ */

function attachDropdownLogic(scopeElement){
  if(!scopeElement) return;

  scopeElement.querySelectorAll(".dropdown-toggle").forEach(toggle=>{
    if(toggle.dataset.bound === "1") return;
    toggle.dataset.bound = "1";

    toggle.onclick = function(e){
      e.stopPropagation();
      const menu = this.nextElementSibling;
      const isOpen = menu.style.display === "block";

      if(!isOpen){
        closeAllDropdowns();
        menu.style.display = "block";
      }else{
        menu.style.display = "none";
      }
    };
  });

  scopeElement.querySelectorAll(".dropdown-menu").forEach(menu=>{
    if(menu.dataset.bound === "1") return;
    menu.dataset.bound = "1";

    menu.addEventListener("click", function(e){
      e.stopPropagation();
    });
  });

  scopeElement.querySelectorAll(".dropdown-menu input[type='checkbox']").forEach(cb=>{
    if(cb.dataset.bound === "1") return;
    cb.dataset.bound = "1";

    cb.onchange = function(){
      const wrapper = this.closest(".ersatz-wrapper");
      const field = wrapper.querySelector(".ersatz-field");
      const boxes = wrapper.querySelectorAll("input[type='checkbox']");
      const values = [];

      boxes.forEach(c=>{
        if(c.checked) values.push(c.dataset.out);
      });

      field.value = values.join(", ");
      syncServicePage();
    };
  });
}

document.addEventListener("click", closeAllDropdowns);

function closeAllDropdowns(){
  document.querySelectorAll(".dropdown-menu").forEach(menu=>{
    menu.style.display = "none";
  });
  closeServiceDescriptionMenu();
}

/* ------------------------------ Status Logic ------------------------------ */

function attachStatusLogic(scopeElement, mode){
  if(!scopeElement) return;

  scopeElement.querySelectorAll(".status-dot").forEach(dot=>{
    if(dot.dataset.bound === "1") return;
    dot.dataset.bound = "1";

    dot.onclick = function(e){
      e.stopPropagation();

      if(mode === "anker"){
        if(!this.classList.contains("is-orange") && !this.classList.contains("is-red")){
          this.classList.add("is-orange");
          this.classList.remove("is-red");
        }else if(this.classList.contains("is-orange")){
          this.classList.remove("is-orange");
          this.classList.add("is-red");
        }else{
          this.classList.remove("is-orange");
          this.classList.remove("is-red");
        }
      }else{
        this.classList.toggle("is-red");
      }
    };
  });
}

function attachVerbogenAutoStatusLogic(scopeElement){
  if(!scopeElement) return;

  scopeElement.querySelectorAll(".verbogen-field").forEach(field=>{
    if(field.dataset.bound === "1") return;
    field.dataset.bound = "1";

    field.addEventListener("input", function(){
      const tr = this.closest("tr");
      const dot = tr.querySelector(".status-dot");
      if(!dot) return;

      const raw = this.value.trim().replace(",", ".");
      if(raw === ""){
        dot.classList.remove("is-red");
        dot.classList.remove("is-orange");
        return;
      }

      const val = Number(raw);
      if(Number.isNaN(val)){
        dot.classList.remove("is-red");
        dot.classList.remove("is-orange");
        return;
      }

      if(Math.abs(val) >= 11){
        dot.classList.remove("is-orange");
        dot.classList.add("is-red");
      }else{
        dot.classList.remove("is-orange");
        dot.classList.remove("is-red");
      }
    });
  });
}

const SERVICE_DESCRIPTION_DEFAULT =
  "Inspektion der kompletten S. Bleyer Fahrzeugfixierung inkl. Wartung, Reinigung und Dokumentation.";

function ensureDefaultServiceDescription(){
  const description = document.getElementById("serviceDescription");
  if(!description) return;

  if(!description.value.trim()){
    description.value = SERVICE_DESCRIPTION_DEFAULT;
    autoGrow(description);
  }
}

function updateServiceDescriptionFromOptions(){
  const description = document.getElementById("serviceDescription");
  const monitors = document.getElementById("serviceOptionMonitors");
  const floorSockets = document.getElementById("serviceOptionFloorSockets");

  if(!description || !monitors || !floorSockets) return;

  let text = "Inspektion der kompletten S. Bleyer Fahrzeugfixierung";

  if(monitors.checked){
    text += " und der Monitoranlagen";
  }

  text += " inkl. Wartung, Reinigung und Dokumentation";

  if(floorSockets.checked){
    text += ", sowie Reinigung der Bodenbuchsen";
  }

  description.value = text + ".";
  autoGrow(description);
  description.dispatchEvent(new Event("input", { bubbles:true }));
}

function syncServiceDescriptionOptionsFromText(){
  const description = document.getElementById("serviceDescription");
  const vehicle = document.getElementById("serviceOptionVehicle");
  const monitors = document.getElementById("serviceOptionMonitors");
  const floorSockets = document.getElementById("serviceOptionFloorSockets");

  if(!description || !vehicle || !monitors || !floorSockets) return;

  const text = description.value || "";

  vehicle.checked = true;
  monitors.checked = /Monitoranlagen/i.test(text);
  floorSockets.checked = /Bodenbuchsen/i.test(text);
}

  const menu = document.getElementById("serviceDescriptionMenu");

  syncServiceDescriptionOptionsFromText();
  closeAllDropdowns();
  menu.classList.add("is-open");
}

  if(menu) menu.classList.remove("is-open");

function initServiceDescriptionPicker(){
  const wrapper = document.getElementById("serviceDescriptionWrapper");
  const description = document.getElementById("serviceDescription");
  const toggle = document.getElementById("serviceDescriptionToggle");
  const menu = document.getElementById("serviceDescriptionMenu");
  const monitors = document.getElementById("serviceOptionMonitors");
  const floorSockets = document.getElementById("serviceOptionFloorSockets");

  if(!wrapper || !description || !toggle || !menu || !monitors || !floorSockets) return;
  if(wrapper.dataset.bound === "1") return;

  wrapper.dataset.bound = "1";

  ensureDefaultServiceDescription();
  syncServiceDescriptionOptionsFromText();

  description.addEventListener("focus", openServiceDescriptionMenu);
  description.addEventListener("click", function(e){
    e.stopPropagation();
    openServiceDescriptionMenu();
  });

  toggle.addEventListener("click", function(e){
    e.stopPropagation();

    if(menu.classList.contains("is-open")){
      closeServiceDescriptionMenu();
    }else{
      description.focus();
      openServiceDescriptionMenu();
    }
  });

  menu.addEventListener("click", function(e){
    e.stopPropagation();
  });

  monitors.addEventListener("change", updateServiceDescriptionFromOptions);
  floorSockets.addEventListener("change", updateServiceDescriptionFromOptions);

function renderSavedServicePartsRows(parts){
  const autoContainer = document.getElementById("serviceAutoPartsRows");
  const manualContainer = document.getElementById("serviceManualPartsRows");
  const section = document.getElementById("servicePartsSection");
  if(!autoContainer || !manualContainer || !section) return;

  autoContainer.innerHTML = "";
  manualContainer.innerHTML = "";
  section.classList.remove("hidden");

  const currentlySelectedParts = collectSelectedParts();
  const selectedKeys = new Set(
    currentlySelectedParts.map(part =>
      `${part.description || ""}||${part.article || ""}||${String(part.count || "")}`
    )
  );

  (parts || []).forEach(part=>{
    const key = `${part.description || ""}||${part.article || ""}||${String(part.count || "")}`;
    const source = part.source === "automatic" ||
      (!part.source && selectedKeys.has(key))
        ? "automatic"
        : "manual";

    if(source === "automatic"){
      addAutomaticServicePartRow(
        part.description || "",
        part.count || "",
        part.article || ""
      );
    }else{
      addServicePartRow(
        part.description || "",
        part.count || "",
        part.article || ""
      );
    }
  });

  ensureServiceManualPartRow();
}

  };

function countFilledHeader(obj){
  return Object.values(obj).filter(v => String(v).trim() !== "").length;
}

function getPreferredHeaderData(){
  const stangen = getHeaderData("Stangen");
  const anker = getHeaderData("Anker");
  const stangenScore = countFilledHeader(stangen);
  const ankerScore = countFilledHeader(anker);

  if(currentCategory === "Anker" && ankerScore > 0) return anker;
  if(currentCategory === "Stangen" && stangenScore > 0) return stangen;

  return ankerScore > stangenScore ? anker : stangen;
}

function collectSelectedParts(){
  const counts = new Map();

  document.querySelectorAll("#stangenPage .dropdown-menu input[type='checkbox']:checked, #ankerPage .dropdown-menu input[type='checkbox']:checked")
    .forEach(cb=>{
      const description = cb.dataset.description || "";
      const article = cb.dataset.article || "";
      const key = description + "||" + article;

      if(!counts.has(key)){
        counts.set(key, {
          description,
          article,
          count: 1
        });
      }else{
        counts.get(key).count += 1;
      }
    });

  return Array.from(counts.values());
}

function syncServicePage(headerOverride = null, partsOverride = null){
  const header = headerOverride || getPreferredHeaderData();
  const parts = partsOverride || collectSelectedParts();

  document.getElementById("serviceMetaLine").textContent = [
    [header.kunde, header.standort].filter(Boolean).join(", "),
    header.bestellnummer,
    header.pst,
    header.pruefraum,
    header.jahr
  ].filter(Boolean).join(" - ");

  renderServicePartsRows(parts);

  const numberValue = document.getElementById("serviceReportNumber").value.trim();
  document.getElementById("serviceReportNumberPreview").textContent = numberValue || "";

  if(document.getElementById("serviceWorkRows").children.length === 0){
    addServiceWorkRow();
  }
}

function getAnkerRows(tableId){
  return Array.from(document.querySelectorAll(`#${tableId} tr`)).slice(1).map(tr=>{

      title: cfg.title,
      tableId: cfg.tableId,
      rows: getStangenRows(cfg.tableId)

function serializeAnkerForm(){

      title: cfg.title,
      tableId: cfg.tableId,
      rows: getAnkerRows(cfg.tableId)
    }))

function serializeServiceForm(){
  const storedHeaderData = getPreferredHeaderData();
  const renderedParts = collectServicePartsFromRenderedRows();

  return {
    headerMetaText: document.getElementById("serviceMetaLine").textContent.trim(),
    headerData: {
      kunde: storedHeaderData.kunde || "",
      standort: storedHeaderData.standort || "",
      bestellnummer: storedHeaderData.bestellnummer || "",
      pst: storedHeaderData.pst || "",
      pruefraum: storedHeaderData.pruefraum || "",
      jahr: storedHeaderData.jahr || ""
    },
    reportNumber: document.getElementById("serviceReportNumber").value.trim(),
    description: document.getElementById("serviceDescription").value.trim(),
    nextDate: document.getElementById("serviceNextDate").value.trim(),
    workRows: Array.from(document.querySelectorAll("#serviceWorkRows .service-work-row")).map(row=>({
      name: row.querySelector(".service-worker-name")?.value?.trim() || "",
      time: row.querySelector(".service-worker-time")?.value?.trim() || ""
    })),
    parts: renderedParts
  };
}

function setCheckedParts(tr, parts){
  const boxes = tr.querySelectorAll(".dropdown-menu input[type='checkbox']");
  boxes.forEach(cb=>cb.checked = false);

  parts.forEach(part=>{
    boxes.forEach(cb=>{
      if(
        cb.dataset.out === String(part.value) ||
        (cb.dataset.description === part.description && cb.dataset.article === part.article)
      ){
        cb.checked = true;
      }
    });
  });

  const field = tr.querySelector(".ersatz-field");
  if(field){
    const values = Array.from(boxes).filter(cb=>cb.checked).map(cb=>cb.dataset.out);
    field.value = values.join(", ");
  }
}

function fillStangenRow(tr, row){
  const tds = tr.querySelectorAll("td");
  tds[0].querySelector("input").value = row.nr || "";
  tds[1].querySelector("input").value = row.laenge || "";
  tds[2].querySelector("input").value = row.verbogen || "";
  tds[4].querySelector("input").value = row.anmerkungen || "";
  setCheckedParts(tr, row.parts || []);
  setStatusState(tr.querySelector(".status-dot"), row.status || "green");
  const verbField = tds[2].querySelector("input");
  if(verbField) verbField.dispatchEvent(new Event("input"));
}

function fillAnkerRow(tr, row){
  const tds = tr.querySelectorAll("td");
  tds[0].querySelector("input").value = row.nummer || "";
  tds[1].querySelector("input").value = row.ankertyp || "";
  tds[2].querySelector("input").value = row.klemmrohr || "";
  tds[3].querySelector("input").value = row.shorehaerte || "";
  tds[5].querySelector("input").value = row.anmerkungen || "";
  setCheckedParts(tr, row.parts || []);
  setStatusState(tr.querySelector(".status-dot"), row.status || "green");
}

function removeAllDataRowsFromTable(table){
  Array.from(table.querySelectorAll("tr")).slice(1).forEach(tr=>tr.remove());
}

function setHeaderData(category, data){
  const prefix = category === "Anker" ? "anker" : "stangen";
  document.getElementById(prefix + "KopfKunde").value = data.kunde || "";
  document.getElementById(prefix + "KopfStandort").value = data.standort || "";
  document.getElementById(prefix + "KopfBestellnummer").value = data.bestellnummer || "";
  document.getElementById(prefix + "KopfPST").value = data.pst || "";
  document.getElementById(prefix + "KopfPruefraum").value = data.pruefraum || "";
  document.getElementById(prefix + "KopfJahr").value = data.jahr || "";
}

function deserializeStangenForm(data){
  setHeaderData("Stangen", data.header || {});
  (data.sections || []).forEach(section=>{
    const table = document.getElementById(section.tableId);
    if(!table) return;
    removeAllDataRowsFromTable(table);
    const rows = section.rows && section.rows.length ? section.rows : [null];
    rows.forEach(row=>{
      addStangenRow(section.tableId);
      const tr = table.querySelectorAll("tr")[table.querySelectorAll("tr").length - 1];
      if(row) fillStangenRow(tr, row);
    });
  });
  syncServicePage();
}

function deserializeAnkerForm(data){
  setHeaderData("Anker", data.header || {});
  (data.sections || []).forEach(section=>{
    const table = document.getElementById(section.tableId);
    if(!table) return;
    removeAllDataRowsFromTable(table);
    const rows = section.rows && section.rows.length ? section.rows : [null];
    rows.forEach(row=>{
      addAnkerRow(section.tableId);
      const tr = table.querySelectorAll("tr")[table.querySelectorAll("tr").length - 1];
      if(row) fillAnkerRow(tr, row);
    });
  });
  syncServicePage();
}

function deserializeServiceForm(data){
  const headerData = data.headerData || {
    kunde: "",
    standort: "",
    bestellnummer: "",
    pst: "",
    pruefraum: "",
    jahr: ""
  };

  document.getElementById("serviceReportNumber").value = data.reportNumber || "";
  document.getElementById("serviceDescription").value = data.description || SERVICE_DESCRIPTION_DEFAULT;
  document.getElementById("serviceNextDate").value = data.nextDate || "";
  syncServiceDescriptionOptionsFromText();
  document.getElementById("serviceReportNumberPreview").textContent = data.reportNumber || "";

  document.getElementById("serviceMetaLine").textContent = data.headerMetaText || [
    [headerData.kunde, headerData.standort].filter(Boolean).join(", "),
    headerData.bestellnummer,
    headerData.pst,
    headerData.pruefraum,
    headerData.jahr
  ].filter(Boolean).join(" - ");

  document.getElementById("serviceWorkRows").innerHTML = "";
  const workRows = data.workRows && data.workRows.length ? data.workRows : [{ name:"", time:"" }];
  workRows.forEach(row=>addServiceWorkRow(row.name, row.time));

  renderSavedServicePartsRows(data.parts || []);
  bindAutoGrow();
}

/* ------------------------------ Dateiname ------------------------------ */

function sanitizeFilename(name){
  return name
    .replace(/[\u0000-\u001f]/g, "")
    .replace(/[\\\/:\*\?"<>\|]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function getPdfFilename(category){
  let header;

  if(category === "Servicebericht"){
    const serviceData = serializeServiceForm();
    header = serviceData.headerData || {};
  }else{
    header = getHeaderData(category);
  }

  const kundeStandort = [header.kunde, header.standort].filter(Boolean).join(" ");
  const parts = [
    category === "Servicebericht" ? document.getElementById("serviceReportNumber").value.trim() : null,
    header.bestellnummer,
    header.pst,
    kundeStandort,
    header.pruefraum,
    header.jahr
  ].filter(Boolean);

  const base = category === "Servicebericht"
    ? "Servicebericht"
    : `Inspektionsprotokoll ${category}`;

  return sanitizeFilename(parts.length ? `${base} - ${parts.join(" - ")}` : base) + ".pdf";
}


/* ------------------------------ Austausch Export / Import ------------------------------ */

function hasHeaderContent(header){
  return countFilledHeader(header || {}) > 0;
}

function isStangenRowDataFilled(row){
  if(!row) return false;
  return Boolean(
    (row.nr || "").trim() ||
    (row.laenge || "").trim() ||
    (row.verbogen || "").trim() ||
    (row.anmerkungen || "").trim() ||
    (row.parts || []).length
  );
}

function isAnkerRowDataFilled(row){
  if(!row) return false;
  return Boolean(
    (row.nummer || "").trim() ||
    (row.ankertyp || "").trim() ||
    (row.klemmrohr || "").trim() ||
    (row.shorehaerte || "").trim() ||
    (row.anmerkungen || "").trim() ||
    (row.parts || []).length
  );
}

function hasStangenContent(data){
  if(!data) return false;
  if(hasHeaderContent(data.header)) return true;
  return (data.sections || []).some(section => (section.rows || []).some(isStangenRowDataFilled));
}

function hasAnkerContent(data){
  if(!data) return false;
  if(hasHeaderContent(data.header)) return true;
  return (data.sections || []).some(section => (section.rows || []).some(isAnkerRowDataFilled));
}

function getExchangeFilename(){
  const header = getPreferredHeaderData();
  const baseParts = [
    header.bestellnummer,
    header.pst,
    [header.kunde, header.standort].filter(Boolean).join(" "),
    header.pruefraum,
    header.jahr
  ].filter(Boolean);

  const base = baseParts.length
    ? "Inspektionsdaten Austausch - " + baseParts.join(" - ")
    : "Inspektionsdaten Austausch";

  return sanitizeFilename(base) + ".json";
}

function exportExchangeFile(){
  const stangenData = serializeStangenForm();
  const ankerData = serializeAnkerForm();

  const payload = {
    app: "Inspektionsprotokoll",
    payloadType: "inspection-exchange",
    version: 1,
    exportedAt: new Date().toISOString(),
    stangen: stangenData,
    anker: ankerData
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = getExchangeFilename();
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function triggerExchangeImport(){
  const input = document.getElementById("exchangeImportInput");
  if(!input) return;
  input.value = "";
  input.click();
}

function normalizeExchangePayload(payload){
  if(!payload || typeof payload !== "object"){
    throw new Error("Ungültige Importdatei.");
  }

  return {
    stangen: payload.stangen || (payload.type === "Stangen" ? payload.data : null),
    anker: payload.anker || (payload.type === "Anker" ? payload.data : null)
  };
}

function mergeHeaderData(category, incomingHeader){
  const current = getHeaderData(category);
  const incoming = incomingHeader || {};

  setHeaderData(category, {
    kunde: current.kunde || incoming.kunde || "",
    standort: current.standort || incoming.standort || "",
    bestellnummer: current.bestellnummer || incoming.bestellnummer || "",
    pst: current.pst || incoming.pst || "",
    pruefraum: current.pruefraum || incoming.pruefraum || "",
    jahr: current.jahr || incoming.jahr || ""
  });
}

function liveRowHasContent(tr){
  const normalFields = Array.from(tr.querySelectorAll("input, textarea"))
    .filter(field => field.type !== "checkbox");

  const hasFieldValue = normalFields.some(field => (field.value || "").trim() !== "");
  const hasCheckedPart = tr.querySelectorAll(".dropdown-menu input[type='checkbox']:checked").length > 0;

  return hasFieldValue || hasCheckedPart;
}

function removeEmptyLiveRows(table){
  Array.from(table.querySelectorAll("tr")).slice(1).forEach(tr=>{
    if(!liveRowHasContent(tr)) tr.remove();
  });
}

function ensureAtLeastOneLiveRow(category, tableId){
  const table = document.getElementById(tableId);
  if(!table) return;

  const rowCount = Array.from(table.querySelectorAll("tr")).slice(1).length;
  if(rowCount > 0) return;

  if(category === "Stangen"){
    addStangenRow(tableId);
  }else if(category === "Anker"){
    addAnkerRow(tableId);
  }
}

function appendStangenRowsFromImport(data){
  let added = 0;

  (data.sections || []).forEach(section=>{
    const table = document.getElementById(section.tableId);
    if(!table) return;

    removeEmptyLiveRows(table);

    (section.rows || []).forEach(row=>{
      if(!isStangenRowDataFilled(row)) return;

      addStangenRow(section.tableId);
      const rows = table.querySelectorAll("tr");
      const tr = rows[rows.length - 1];
      fillStangenRow(tr, row);
      added++;
    });

    ensureAtLeastOneLiveRow("Stangen", section.tableId);
  });

  return added;
}

function appendAnkerRowsFromImport(data){
  let added = 0;

  (data.sections || []).forEach(section=>{
    const table = document.getElementById(section.tableId);
    if(!table) return;

    removeEmptyLiveRows(table);

    (section.rows || []).forEach(row=>{
      if(!isAnkerRowDataFilled(row)) return;

      addAnkerRow(section.tableId);
      const rows = table.querySelectorAll("tr");
      const tr = rows[rows.length - 1];
      fillAnkerRow(tr, row);
      added++;
    });

    ensureAtLeastOneLiveRow("Anker", section.tableId);
  });

  return added;
}

function mergeImportedStangen(data){
  if(!data) return 0;
  mergeHeaderData("Stangen", data.header || {});
  return appendStangenRowsFromImport(data);
}

function mergeImportedAnker(data){
  if(!data) return 0;
  mergeHeaderData("Anker", data.header || {});
  return appendAnkerRowsFromImport(data);
}

async function importExchangeFile(input){
  const file = input?.files?.[0];
  if(!file) return;

  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    const data = normalizeExchangePayload(payload);

    if(!hasStangenContent(data.stangen) && !hasAnkerContent(data.anker)){
      alert("In der Importdatei wurden keine Stangen- oder Ankerdaten gefunden.");
      return;
    }

    const addedStangen = mergeImportedStangen(data.stangen);
    const addedAnker = mergeImportedAnker(data.anker);

    syncServicePage();
    bindAutoGrow();

    alert(
      "Import abgeschlossen.\n" +
      "Stangen-Zeilen ergänzt: " + addedStangen + "\n" +
      "Anker-Zeilen ergänzt: " + addedAnker
    );
  }catch(error){
    console.error(error);
    alert("Die Datei konnte nicht importiert werden. Bitte prüfe, ob es eine exportierte Inspektionsdaten-Datei ist.");
  }finally{
    if(input) input.value = "";
  }
}

/* ------------------------------ Zwischenablage ------------------------------ */

function sortHistory(records){
  return records.sort((a,b)=>{
    return (b.updatedAt || "").localeCompare(a.updatedAt || "");
  });
}

function filterHistory(records, query){
  const q = (query || "").trim().toLowerCase();
  if(!q) return records;

  return records.filter(record=>{
    const haystack = [
      record.filename,
      record.type,
      record.kunde,
      record.standort,
      record.jahr
    ].join(" ").toLowerCase();

    return haystack.includes(q);
  });
}

async function renderHistory(){
  const container = document.getElementById("historyContainer");
  const search = document.getElementById("historySearchInput")?.value || "";
  const records = filterHistory(sortHistory(await getAllRecords()), search);

  if(!records.length){
    container.innerHTML = `<div class="history-empty">Keine passenden Einträge gefunden.</div>`;
    return;
  }

  container.innerHTML = `<div class="history-list"></div>`;
  const list = container.querySelector(".history-list");

  records.forEach(record=>{
    const item = document.createElement("div");
    item.className = "history-item";
    item.innerHTML = `
      <div class="history-top">
        <div class="history-name">${escapeHtml(record.filename || "Ohne Namen")}</div>
        <div class="history-actions">
          <button class="history-btn history-open" data-id="${escapeHtml(record.id)}">Öffnen</button>
          <button class="history-btn history-delete" data-id="${escapeHtml(record.id)}">Löschen</button>
        </div>
      </div>
    `;
    list.appendChild(item);
  });

  list.querySelectorAll(".history-open").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const record = await getRecord(btn.dataset.id);
      if(record) loadRecordIntoApp(record);
    });
  });

  list.querySelectorAll(".history-delete").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      await deleteRecord(btn.dataset.id);
      if(currentRecordId === btn.dataset.id){
        currentRecordId = null;
        currentRecordType = null;
      }
      renderHistory();
    });
  });
}

function loadRecordIntoApp(record){
  currentRecordId = record.id;
  currentRecordType = record.type;
  currentCategory = record.type;

  if(record.type === "Stangen"){
    deserializeStangenForm(record.data);
    hideAllPages();
    document.getElementById("stangenPage").style.display = "block";
    return;
  }

  if(record.type === "Anker"){
    deserializeAnkerForm(record.data);
    hideAllPages();
    document.getElementById("ankerPage").style.display = "block";
    return;
  }

  if(record.type === "Servicebericht"){
    deserializeServiceForm(record.data);
    hideAllPages();
    document.getElementById("servicePage").style.display = "block";
  }
}

/* ------------------------------ Speichern ------------------------------ */

function createId(){
  if(window.crypto && crypto.randomUUID){
    return crypto.randomUUID();
  }
  return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
}

async function saveCurrentForm(type){
  let data;
  let header;
  let filename;

  if(type === "Stangen"){
    data = serializeStangenForm();
    header = data.header;
    filename = getPdfFilename("Stangen");
  }else if(type === "Anker"){
    data = serializeAnkerForm();
    header = data.header;
    filename = getPdfFilename("Anker");
  }else{
    data = serializeServiceForm();
    header = data.headerData || {};
    filename = getPdfFilename("Servicebericht");
  }

  const record = {
    id: currentRecordId || createId(),
    type,
    filename,
    kunde: header.kunde || "",
    standort: header.standort || "",
    jahr: header.jahr || "",
    updatedAt: new Date().toISOString(),
    data
  };

  await putRecord(record);
  currentRecordId = record.id;
  currentRecordType = type;
  renderHistory();
}

/* ------------------------------ PDF Stangen / Anker ------------------------------ */

async function generatePDF(category){
  await saveCurrentForm(category);

  const { jsPDF } = window.jspdf;
  const pageId = category === "Anker" ? "ankerPage" : "stangenPage";
  const original = document.getElementById(pageId);
  const clone = original.cloneNode(true);

  removePdfUiElements(clone);
  removePdfHeaderBlock(clone);
  removeEmptyRowsFromClone(clone);

  clone.style.position = "absolute";
  clone.style.left = "-99999px";
  clone.style.top = "0";
  clone.style.width = "1600px";
  clone.style.background = "#ffffff";
  clone.style.padding = "0";
  clone.style.margin = "0";
  clone.style.transform = "none";
  clone.style.zoom = "1";

  document.body.appendChild(clone);

  const pdf = new jsPDF("l", "mm", "a4");
  const logoDataUrl = await getLogoDataUrl();
  const titleImg = await createPdfTitleImage(
    category === "Anker"
      ? "Inspektionsprotokoll Anker"
      : "Inspektionsprotokoll Stangen"
  );
  const headerSubtitleText = getPdfHeaderSubtitle(category);
  const subtitleImg = headerSubtitleText ? await createPdfSubtitleImage(headerSubtitleText) : null;

  const pageWidth = 297;
  const pageHeight = 210;

  const marginLeftRight = 10;
  const titleOffsetX = 2.5;
  const firstPageTitleTop = 10;
  const titleTargetHeightMm = 6.8;

  const subtitleTop = firstPageTitleTop + titleTargetHeightMm + 2.8;
  const subtitleTargetHeightMm = subtitleImg ? 3.8 : 0;

  const logoHeightFirstPage = logoDataUrl ? 14 : 0;
  const logoTop = subtitleImg
    ? subtitleTop + subtitleTargetHeightMm + 4
    : firstPageTitleTop + titleTargetHeightMm + 4;

  const firstPageContentTop = logoDataUrl
    ? logoTop + logoHeightFirstPage + 5
    : (subtitleImg ? subtitleTop + subtitleTargetHeightMm + 5 : firstPageTitleTop + titleTargetHeightMm + 5);

  const pageNumberY = pageHeight - 4.5;

  const otherPagesContentTop = 10;
  const contentBottom = pageHeight - 10;

  const contentWidth = pageWidth - (marginLeftRight * 2);

  let currentY = firstPageContentTop;
  let isFirstPdfPage = true;

  const sections = Array.from(clone.querySelectorAll(".section"));

  for(let index = 0; index < sections.length; index++){
    const section = sections[index];

    const canvas = await html2canvas(section, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff",
      windowWidth: 1600,
      width: section.scrollWidth,
      height: section.scrollHeight
    });

    const imgWidthMm = contentWidth;
    const imgHeightMm = canvas.height * imgWidthMm / canvas.width;

    const currentTop = isFirstPdfPage ? firstPageContentTop : otherPagesContentTop;
    const usableHeight = contentBottom - currentTop;

    if(currentY < currentTop) currentY = currentTop;

    if(imgHeightMm <= usableHeight){
      if(currentY + imgHeightMm > contentBottom){
        pdf.addPage();
        isFirstPdfPage = false;
        currentY = otherPagesContentTop;
      }

      pdf.addImage(
        canvas.toDataURL("image/jpeg", 0.95),
        "JPEG",
        marginLeftRight,
        currentY,
        imgWidthMm,
        imgHeightMm
      );

      currentY += imgHeightMm + 5;

      continue;
    }

    let remainingPx = canvas.height;
    let sourceY = 0;
    const pxPerMm = canvas.width / imgWidthMm;

    while(remainingPx > 0){
      const currentPageTop = isFirstPdfPage ? firstPageContentTop : otherPagesContentTop;
      const currentUsableHeight = contentBottom - currentPageTop;

      if(currentY !== currentPageTop){
        pdf.addPage();
        isFirstPdfPage = false;
        currentY = otherPagesContentTop;
      }

      const sliceHeightPx = Math.floor(currentUsableHeight * pxPerMm);
      const currentSlicePx = Math.min(sliceHeightPx, remainingPx);

      const sliceCanvas = document.createElement("canvas");
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = currentSlicePx;

      const ctx = sliceCanvas.getContext("2d");
      ctx.drawImage(
        canvas,
        0, sourceY, canvas.width, currentSlicePx,
        0, 0, canvas.width, currentSlicePx
      );

      const sliceHeightMm = currentSlicePx / pxPerMm;

      pdf.addImage(
        sliceCanvas.toDataURL("image/jpeg", 0.95),
        "JPEG",
        marginLeftRight,
        currentY,
        imgWidthMm,
        sliceHeightMm
      );

      remainingPx -= currentSlicePx;
      sourceY += currentSlicePx;

      if(remainingPx > 0){
        pdf.addPage();
        isFirstPdfPage = false;
        currentY = otherPagesContentTop;
      }else{
        currentY += sliceHeightMm + 5;
      }
    }
  }

  document.body.removeChild(clone);

  const pageCount = pdf.getNumberOfPages();

  for(let i = 1; i <= pageCount; i++){
    pdf.setPage(i);

    if(i === 1 && titleImg){
      const naturalRatio = titleImg.widthPx / titleImg.heightPx;
      const targetWidthMm = titleTargetHeightMm * naturalRatio;

      pdf.addImage(
        titleImg.dataUrl,
        "PNG",
        marginLeftRight + titleOffsetX,
        firstPageTitleTop,
        targetWidthMm,
        titleTargetHeightMm
      );
    }

    if(i === 1 && subtitleImg){
      const naturalRatio = subtitleImg.widthPx / subtitleImg.heightPx;
      let targetHeightMm = subtitleTargetHeightMm;
      let targetWidthMm = targetHeightMm * naturalRatio;
      const maxSubtitleWidthMm = contentWidth - titleOffsetX;

      if(targetWidthMm > maxSubtitleWidthMm){
        targetWidthMm = maxSubtitleWidthMm;
        targetHeightMm = targetWidthMm / naturalRatio;
      }

      pdf.addImage(
        subtitleImg.dataUrl,
        "PNG",
        marginLeftRight + titleOffsetX,
        subtitleTop,
        targetWidthMm,
        targetHeightMm
      );
    }

    if(i === 1 && logoDataUrl){
      pdf.addImage(
        logoDataUrl,
        "PNG",
        0,
        logoTop,
        pageWidth,
        logoHeightFirstPage
      );
    }

    pdf.setTextColor(156, 163, 175);
    pdf.setFontSize(8);
    pdf.text(`Seite ${i} von ${pageCount}`, pageWidth - 16, pageNumberY, { align: "right" });
    pdf.setTextColor(17, 17, 17);
  }

  pdf.save(getPdfFilename(category));
}

/* ------------------------------ Servicebericht PDF ------------------------------ */

function createPdfOutlinedCell(value){
  const cell = document.createElement("div");
  cell.style.background = "#ffffff";
  cell.style.border = "1px solid #d1d5db";
  cell.style.borderRadius = "10px";
  cell.style.padding = "12px";
  cell.style.fontSize = "12px";
  cell.style.whiteSpace = "pre-wrap";
  cell.style.minHeight = "20px";
  cell.textContent = value || "";
  return cell;
}

function createPdfPlainTextCell(value){
  const cell = document.createElement("div");
  cell.style.background = "#ffffff";
  cell.style.border = "none";
  cell.style.borderRadius = "0";
  cell.style.padding = "0";
  cell.style.fontSize = "12px";
  cell.style.lineHeight = "1.35";
  cell.style.whiteSpace = "pre-wrap";
  cell.style.minHeight = "16px";
  cell.style.textAlign = "left";
  cell.textContent = value || "";
  return cell;
}

function buildServicePdfPageDom({

  headerMetaText,
  logoDataUrl,
  reportNumber,
  description,
  pageWorkRows,
  includePartsHeader,
  pagePartsRows,
  includeEmptyPartsNotice = false,
  nextDate,
  includeBottomBlock,
  showHeaderBlock,
  showReportTitle

  const top = document.createElement("div");

    const title = document.createElement("h1");

  if(showHeaderBlock){
    const subtitleText = (headerMetaText || "").trim() || formatHeaderSubtitle(headerData || {});

      subtitle.style.fontSize = "15px";
      subtitle.style.fontWeight = "400";
      subtitle.style.color = "#374151";
      subtitle.style.lineHeight = "1.35";

      subtitle.textContent = subtitleText;

    if(logoDataUrl){

      logo.style.height = "48px";

      logo.style.marginLeft = "-40px";
      logo.style.marginRight = "-40px";
      logo.style.marginBottom = "14px";

  if(description){
    const desc = document.createElement("div");
    desc.style.background = "#ffffff";
    desc.style.border = "none";
    desc.style.borderRadius = "0";
    desc.style.padding = "12px 0 0 0";
    desc.style.fontSize = "14px";
    desc.style.whiteSpace = "pre-wrap";
    desc.style.minHeight = "20px";
    desc.style.marginBottom = "22px";
    desc.textContent = description || "";
    top.appendChild(desc);
  }

  // Mitarbeiter und Arbeitszeit nur anzeigen, wenn es sich um die erste Seite
  // handelt oder auf der Seite tatsächlich noch Mitarbeiterzeilen vorhanden sind.
  // Dadurch wird die Überschrift auf reinen Ersatzteil-Folgeseiten nicht wiederholt.
  if(showHeaderBlock || pageWorkRows.length > 0){
    const workerHeader = document.createElement("div");
    workerHeader.style.display = "grid";
    workerHeader.style.gridTemplateColumns = "2fr 1fr 2fr";
    workerHeader.style.gap = "12px";
    workerHeader.style.fontSize = "14px";
    workerHeader.style.fontWeight = "600";
    workerHeader.style.marginBottom = "12px";

    const workerHeaderLeft = document.createElement("div");
    workerHeaderLeft.style.gridColumn = "1 / span 2";
    workerHeaderLeft.textContent = "Ausführender Mitarbeiter";

    const workerHeaderRight = document.createElement("div");
    workerHeaderRight.style.gridColumn = "3";
    workerHeaderRight.textContent = "Arbeitszeit";

    workerHeader.appendChild(workerHeaderLeft);
    workerHeader.appendChild(workerHeaderRight);
    top.appendChild(workerHeader);

    pageWorkRows.forEach(row=>{
      const rowEl = document.createElement("div");
      rowEl.style.display = "grid";
      rowEl.style.gridTemplateColumns = "2fr 1fr 2fr";
      rowEl.style.gap = "12px";
      rowEl.style.marginBottom = "8px";
      rowEl.style.alignItems = "start";

      const left = createPdfPlainTextCell(row.name || "");
      left.style.gridColumn = "1 / span 2";
      left.style.fontSize = "14px";

      const right = createPdfPlainTextCell(row.time || "");
      right.style.gridColumn = "3";

      top.appendChild(rowEl);

  if(includePartsHeader && pagePartsRows.length > 0){

    partsHeader.style.gridTemplateColumns = "2fr 1fr 2fr";

    partsHeader.style.fontSize = "14px";
    partsHeader.style.fontWeight = "600";
    partsHeader.style.margin = "28px 0 12px 0";

      const div = document.createElement("div");

      partsHeader.appendChild(div);

    top.appendChild(partsHeader);
  }

  pagePartsRows.forEach(part=>{
    const rowEl = document.createElement("div");
    rowEl.style.display = "grid";
    rowEl.style.gridTemplateColumns = "2fr 1fr 2fr";
    rowEl.style.gap = "12px";
    rowEl.style.marginBottom = "8px";

    rowEl.appendChild(createPdfOutlinedCell(part.description || ""));
    rowEl.appendChild(createPdfOutlinedCell(String(part.count || "")));

    top.appendChild(rowEl);

  if(includeEmptyPartsNotice){
    const emptyPartsHeading = document.createElement("div");
    emptyPartsHeading.style.fontSize = "14px";
    emptyPartsHeading.style.fontWeight = "600";
    emptyPartsHeading.style.margin = "28px 0 10px 0";
    emptyPartsHeading.textContent = "Ersatzteile";
    top.appendChild(emptyPartsHeading);

    const emptyPartsText = document.createElement("div");
    emptyPartsText.style.fontSize = "14px";
    emptyPartsText.style.lineHeight = "1.35";
    emptyPartsText.style.marginBottom = "8px";
    emptyPartsText.textContent = "Es wurden keine Ersatzteile verbaut.";
    top.appendChild(emptyPartsText);
  }

  page.appendChild(top);

  if(includeBottomBlock){
    const bottom = document.createElement("div");
    bottom.style.paddingTop = "28px";

    const nextHeading = document.createElement("div");
    nextHeading.style.fontSize = "15px";
    nextHeading.style.fontWeight = "600";
    nextHeading.style.margin = "0 0 10px 0";
    nextHeading.textContent = "Nächster Service";
    bottom.appendChild(nextHeading);

    const nextLine = document.createElement("div");
    nextLine.style.fontSize = "14px";
    nextLine.style.fontWeight = "400";
    nextLine.style.color = "#374151";
    nextLine.style.lineHeight = "1.35";
    nextLine.style.marginBottom = "48px";
    nextLine.textContent = "Nächster Service fällig am" + (nextDate ? " - " + nextDate : " - MM/JJJJ");

    bottom.appendChild(nextLine);

    const signatures = document.createElement("div");
    signatures.style.display = "grid";
    signatures.style.gridTemplateColumns = "1fr 1fr";
    signatures.style.gap = "32px";
    signatures.innerHTML = `
      <div style="border-top:1px solid #888;padding-top:8px;font-size:14px;color:#333;">Unterschrift Auftraggeber</div>
      <div style="border-top:1px solid #888;padding-top:8px;font-size:14px;color:#333;">Unterschrift S. Bleyer GmbH</div>
    `;
    bottom.appendChild(signatures);

    page.appendChild(bottom);
  }

  const footer = document.createElement("div");
  footer.style.display = "grid";
  footer.style.gridTemplateColumns = "1.35fr 1fr 1.15fr";
  footer.style.gap = "34px";
  footer.style.alignItems = "start";
  footer.style.marginTop = "30px";
  footer.style.padding = "18px 0 0 0";
  footer.style.boxSizing = "border-box";
  footer.style.fontSize = "9px";
  footer.style.fontWeight = "400";
  footer.style.lineHeight = "1.35";
  footer.style.color = "#111";

  const footerLeft = document.createElement("div");
  footerLeft.style.whiteSpace = "pre-line";
  footerLeft.textContent =
    "S. Bleyer GmbH\n" +
    "Steinbeisstr. 20 - 73614 Schorndorf\n" +
    "Geschäftsführer: Stefan Bleyer";

  const footerCenter = document.createElement("div");
  footerCenter.style.whiteSpace = "pre-line";
  footerCenter.textContent =
    "www.s-bleyer-gmbh.de\n" +
    "info@s-bleyer-gmbh.de\n" +
    "+49 (0) 7181 / 93270";

  const footerRight = document.createElement("div");
  footerRight.style.whiteSpace = "pre-line";
  footerRight.textContent =
    "Steuer.Nr.: 82120/43532\n" +
    "Ust-Id-Nr.: DE814464233\n" +
    "Registergericht Stuttgart HRB 282215";

  footer.appendChild(footerLeft);
  footer.appendChild(footerCenter);
  footer.appendChild(footerRight);
  page.appendChild(footer);

  return page;
}

function measureNodeHeight(node){
  const wrap = document.createElement("div");
  wrap.style.position = "absolute";
  wrap.style.left = "-99999px";
  wrap.style.top = "0";
  wrap.style.width = "794px";
  wrap.appendChild(node);
  document.body.appendChild(wrap);
  const h = node.offsetHeight;
  document.body.removeChild(wrap);
  return h;
}

function fitsServicePage(config){
  const test = buildServicePdfPageDom(config);
  return measureNodeHeight(test) <= 1123;
}

async function generateServicePDF(){
  syncServicePage();
  await saveCurrentForm("Servicebericht");

  const { jsPDF } = window.jspdf;
  const data = serializeServiceForm();
  const logoDataUrl = await getLogoDataUrl();

  const pagesData = [];
  let workIndex = 0;
  let partIndex = 0;
  let firstPage = true;

  const workRows = data.workRows.filter(row=>row.name || row.time);
  const parts = data.parts || [];

  while(
    firstPage ||
    workIndex < workRows.length ||
    partIndex < parts.length ||
    (firstPage && workRows.length === 0 && parts.length === 0)
  ){
    let pageWorkRows = [];
    let pagePartsRows = [];

    while(workIndex < workRows.length){
      const testConfig = {
        headerData: data.headerData,
        headerMetaText: data.headerMetaText,
        logoDataUrl,
        reportNumber: data.reportNumber,
        description: firstPage ? data.description : "",
        pageWorkRows: [...pageWorkRows, workRows[workIndex]],
        includePartsHeader: false,
        pagePartsRows,
        includeEmptyPartsNotice: false,
        nextDate: data.nextDate,
        includeBottomBlock: false,
        showHeaderBlock: firstPage,
        showReportTitle: firstPage
      };

      if(fitsServicePage(testConfig)){
        pageWorkRows.push(workRows[workIndex]);
        workIndex++;
      }else{
        break;
      }
    }

    while(partIndex < parts.length){
      const testConfig = {
        headerData: data.headerData,
        headerMetaText: data.headerMetaText,
        logoDataUrl,
        reportNumber: data.reportNumber,
        description: firstPage ? data.description : "",
        pageWorkRows,
        includePartsHeader: true,
        pagePartsRows: [...pagePartsRows, parts[partIndex]],
        includeEmptyPartsNotice: false,
        nextDate: data.nextDate,
        includeBottomBlock: false,
        showHeaderBlock: firstPage,
        showReportTitle: firstPage
      };

      if(fitsServicePage(testConfig)){
        pagePartsRows.push(parts[partIndex]);
        partIndex++;
      }else{
        break;
      }
    }

    if(pageWorkRows.length === 0 && pagePartsRows.length === 0){
      if(workIndex < workRows.length){
        pageWorkRows.push(workRows[workIndex]);
        workIndex++;
      }else if(partIndex < parts.length){
        pagePartsRows.push(parts[partIndex]);
        partIndex++;
      }else{
        break;
      }
    }

    pagesData.push({
      headerData: data.headerData,
      headerMetaText: data.headerMetaText,
      logoDataUrl,
      reportNumber: data.reportNumber,
      description: firstPage ? data.description : "",
      pageWorkRows,
      includePartsHeader: pagePartsRows.length > 0,
      pagePartsRows,
      includeEmptyPartsNotice: false,
      nextDate: data.nextDate,
      includeBottomBlock: false,
      showHeaderBlock: firstPage,
      showReportTitle: firstPage
    });

    firstPage = false;

    if(workRows.length === 0 && parts.length === 0) break;
  }

  if(pagesData.length === 0){
    pagesData.push({
      headerData: data.headerData,
      headerMetaText: data.headerMetaText,
      logoDataUrl,
      reportNumber: data.reportNumber,
      description: data.description,
      pageWorkRows: [],
      includePartsHeader: false,
      pagePartsRows: [],
      includeEmptyPartsNotice: true,
      nextDate: data.nextDate,
      includeBottomBlock: true,
      showHeaderBlock: true,
      showReportTitle: true
    });
  }else{
    const lastPage = pagesData[pagesData.length - 1];
    lastPage.includeBottomBlock = true;

    if(parts.length === 0){
      lastPage.includeEmptyPartsNotice = true;
    }
  }

  const pdf = new jsPDF("p", "mm", "a4");
  const pageCount = pagesData.length;

  for(let i=0;i<pageCount;i++){
    if(i > 0) pdf.addPage();

    const pageDom = buildServicePdfPageDom(pagesData[i]);
    pageDom.style.position = "absolute";
    pageDom.style.left = "-99999px";
    pageDom.style.top = "0";
    document.body.appendChild(pageDom);

    const canvas = await html2canvas(pageDom, {
      scale:3,
      useCORS:true,
      backgroundColor:"#ffffff"
    });

    document.body.removeChild(pageDom);

    const pageWidthMm = 210;
    const pageHeightMm = 297;
    pdf.addImage(canvas.toDataURL("image/png"), "PNG", 0, 0, pageWidthMm, pageHeightMm);

    if(pageCount > 1){
      pdf.setTextColor(156, 163, 175);
      pdf.setFontSize(7);
      pdf.text(
        `Seite ${i + 1} von ${pageCount}`,
        pageWidthMm - 7,
        pageHeightMm - 4,
        { align:"right" }
      );
      pdf.setTextColor(17, 17, 17);
    }
  }

  pdf.save(getPdfFilename("Servicebericht"));
}

/* ------------------------------ Auto Grow ------------------------------ */

function autoGrow(el){
  if(!el) return;
  el.style.height = "44px";
  el.style.height = el.scrollHeight + "px";
}

function bindAutoGrow(scope=document){
  scope.querySelectorAll(".autogrow").forEach(el=>{
    if(el.dataset.bound === "1") return;
    el.dataset.bound = "1";
    autoGrow(el);
    el.addEventListener("input", function(){
      autoGrow(this);
    });
  });
}

/* ------------------------------ Live Sync ------------------------------ */

document.addEventListener("input", function(e){
  if(e.target.matches(".service-worker-name")){
    expandServiceWorkerShortcut(e.target);
  }

  if(e.target.id === "serviceReportNumber"){
    document.getElementById("serviceReportNumberPreview").textContent = e.target.value.trim();

  if(e.target.id === "historySearchInput"){

  }

  if(
    e.target.matches("#stangenPage .header-row input, #ankerPage .header-row input")
  ){
    syncServicePage();
  }
});

document.addEventListener("change", function(e){
  if(e.target.matches(".dropdown-menu input[type='checkbox']")){
    syncServicePage();
  }
});

/* ------------------------------ Utils ------------------------------ */

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function escapeJs(str){
  return String(str ?? "").replaceAll("\\", "\\\\").replaceAll("'", "\\'");
}
